name: Hospital System CI/CD

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install pipenv
        run: pip install pipenv

      - name: Install packages
        run: pipenv install --dev  # --dev includes pytest!

      - name: Run Tests
        run: pipenv run pytest test/ -v

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Render
        run: echo "All tests passed — deploy step goes here"
        # Replace above with your actual Render deploy hook when ready